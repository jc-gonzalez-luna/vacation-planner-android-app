<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Vacation Planner Backend</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(to bottom right, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
            color: #fff;
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: 80px auto;
            background: rgba(0, 0, 0, 0.25);
            padding: 40px;
            border-radius: 16px;
            backdrop-filter: blur(8px);
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        p {
            font-size: 20px;
            margin-bottom: 30px;
        }

        .download-btn {
            display: inline-block;
            padding: 15px, 30px;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            background-color: #1e90ff;
            border-radius: 10px;
            text-decoration: none;
            transition: 0.3s;
        }

        .download-btn:hover {
            background-color: #0b70d0;
            transform: scale(1);
        }

        footer {
            margin-top: 40px;
            font-size: 15px;
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Vacation Planner Android Application</h1>
        <p>The Vacation Planner Android application has been successfully deployed using AWS S3
            Static Website Hosting. Download the APK below to install the application
        </p>

        <a class="download-btn"
            href="https://vacation-planner-apk.s3.us-east-2.amazonaws.com/app-release.apk"
            download>
            Download Vacation Planner APK
        </a>"

        <footer>
            Version 1.0 - Deployed via AWS S3 Static Website Hosting
        </footer>
    </div>
    
</body>
</html>
